name: Update README Daily Log

on:
  push:
    branches:
      - main

jobs:
  update-readme:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Run update script
        run: python3 scripts/update_readme.py

      - name: Commit updated README
        run: |
          git config user.name "MohammadNasir520"
          git config user.email "${{ secrets.GIT_EMAIL }}"
          git add README.md
          git diff --cached --quiet || git commit -m "chore: update daily log in README"
          git push
